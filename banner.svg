<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="50%" stop-color="#16161e"/>
      <stop offset="100%" stop-color="#1f1d30"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bb9af7"/>
      <stop offset="50%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#2a2b3d" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="url(#bg)"/>
  <rect width="900" height="260" fill="url(#grid)"/>

  <!-- circuit lines -->
  <g stroke="#3b3f5c" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M0,40 H120 L140,60 H260"/>
    <path d="M0,220 H80 L100,200 H300"/>
    <path d="M900,40 H780 L760,60 H620"/>
    <path d="M900,220 H820 L800,200 H640"/>
    <circle cx="140" cy="60" r="3" fill="#7dcfff"/>
    <circle cx="100" cy="200" r="3" fill="#bb9af7"/>
    <circle cx="760" cy="60" r="3" fill="#7dcfff"/>
    <circle cx="800" cy="200" r="3" fill="#bb9af7"/>
  </g>

  <!-- glow corner accents -->
  <circle cx="40" cy="40" r="60" fill="#7dcfff" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="860" cy="220" r="80" fill="#bb9af7" opacity="0.10" filter="url(#blur1)"/>

  <!-- outer frame -->
  <rect x="20" y="20" width="860" height="220" rx="6" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.8"/>
  <rect x="28" y="28" width="844" height="204" rx="4" fill="none" stroke="#414868" stroke-width="0.8"/>

  <!-- top bar -->
  <circle cx="44" cy="44" r="4" fill="#f7768e"/>
  <circle cx="58" cy="44" r="4" fill="#e0af68"/>
  <circle cx="72" cy="44" r="4" fill="#9ece6a"/>
  <text x="860" y="48" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="11" fill="#565f89">root@adryan:~$ status: online</text>

  <!-- main title -->
  <text x="450" y="118" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="38" font-weight="bold" fill="#c0caf5" letter-spacing="4">ADRYAN SILVA SANTOS</text>
  <text x="450" y="150" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="15" fill="url(#glow)" letter-spacing="6">SOFTWARE · DATA · AUTOMATION</text>

  <!-- divider -->
  <line x1="250" y1="172" x2="650" y2="172" stroke="#414868" stroke-width="1"/>
  <circle cx="450" cy="172" r="3" fill="#7dcfff"/>

  <!-- stack line -->
  <text x="450" y="200" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="13" fill="#a9b1d6">
    <tspan fill="#7dcfff">Python</tspan> | <tspan fill="#bb9af7">React</tspan> | <tspan fill="#7dcfff">Node</tspan> | <tspan fill="#bb9af7">Analytics</tspan> | <tspan fill="#7dcfff">Healthcare Tech</tspan>
  </text>

  <!-- blinking cursor -->
  <rect x="560" y="208" width="8" height="14" fill="#9ece6a">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
