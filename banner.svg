<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <style>
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(220px); } }
      .cursor { animation: blink 1s infinite step-end; }
      .scanline { animation: scan 4s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>
  
  <!-- Grid Tech -->
  <g stroke="#1f2335" stroke-width="1" fill="none">
    <path d="M0,55 H900 M0,110 H900 M0,165 H900 M225,0 V220 M450,0 V220 M675,0 V220"/>
  </g>

  <!-- Scan Line Effect -->
  <rect class="scanline" x="0" y="0" width="900" height="2" fill="#7dcfff" opacity="0.3"/>

  <!-- Border -->
  <rect x="10" y="10" width="880" height="200" rx="4" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.9"/>
  <rect x="16" y="16" width="868" height="188" rx="2" fill="none" stroke="#2a2e44" stroke-width="1"/>

  <!-- Terminal Header -->
  <circle cx="32" cy="32" r="5" fill="#f7768e"/>
  <circle cx="48" cy="32" r="5" fill="#e0af68"/>
  <circle cx="64" cy="32" r="5" fill="#9ece6a"/>
  <text x="868" y="36" text-anchor="end" font-family="monospace" font-size="12" fill="#565f89">[SYS] adryan_bot.init()</text>

  <!-- Main Text -->
  <text x="450" y="90" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#c0caf5" letter-spacing="2">ADRYAN SILVA SANTOS</text>
  <text x="450" y="120" text-anchor="middle" font-family="monospace" font-size="14" fill="#7dcfff" letter-spacing="3">&gt; DATA ENGINEERING &amp; PROCESS AUTOMATION</text>
  
  <line x1="280" y1="135" x2="620" y2="135" stroke="#414868" stroke-width="1"/>
  <circle cx="450" cy="135" r="2" fill="#bb9af7"/>

  <text x="450" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#9ece6a" letter-spacing="1">[ Python ] [ SQL ] [ BI ] [ Apps Script ]</text>
  <text x="450" y="190" text-anchor="middle" font-family="monospace" font-size="12" fill="#565f89" letter-spacing="2">LOADING DATA PIPELINES<span class="cursor" fill="#7dcfff">_</span></text>
</svg>
